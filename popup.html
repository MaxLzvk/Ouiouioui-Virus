<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <style>
        body {
            font-family: sans-serif;
            width: 180px;
            padding: 16px;
            text-align: center;
            background: #fff;
        }

        h2 {
            margin: 0 0 12px;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 10px;
            font-size: 14px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        button.on {
            background: #4caf50;
            color: #fff;
        }

        button.off {
            background: #f44336;
            color: #fff;
        }
    </style>
</head>

<body>
    <h2>OuiOui Prank</h2>
    <button id="toggle">Loading...</button>
    <script src="popup.js"></script>
</body>

</html>
